<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系方式</title>
    <style>
        /* 1. 让背景极简，突出文字 */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #ffffff; /* 纯白背景 */
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            color: #000;
        }

        /* 2. 这里的标题 */
        .label {
            font-size: 14px;
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        /* 3. 核心：让邮箱地址巨大且清晰 */
        .email-address {
            font-size: clamp(24px, 8vw, 60px); /* 字体大小随屏幕自动缩放 */
            font-weight: 700;
            margin: 0;
            padding: 20px;
            background: #f0f0f0; /* 给个浅灰色底块，增加视觉重点 */
            border-radius: 12px;
            word-break: break-all;
            text-align: center;
        }

        /* 4. 辅助提示 */
        .hint {
            margin-top: 20px;
            font-size: 14px;
            color: #007AFF;
            text-decoration: none;
            border-bottom: 1px solid #007AFF;
        }
    </style>
</head>
<body>

    <div class="label">My Email Address</div>
    <p class="email-address">philiptrip1975@gmail.com</p>
    
    <a href="mailto:philiptrip1975@gmail.com" class="hint">Click to email me</a>

</body>
</html>
