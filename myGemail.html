<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我</title>
    <style>
        /* 基础样式：让页面看起来干净现代 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f7f6; /* 淡淡的底色 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* 卡片样式：像名片一样浮起来 */
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); /* 柔和的阴影 */
            text-align: center;
            max-width: 350px;
            width: 90%;
        }

        h1 {
            color: #333;
            margin-bottom: 0.5rem;
        }

        p {
            color: #666;
            margin-bottom: 1.5rem;
        }

        /* 按钮样式：让邮箱地址看起来可以点击 */
        .email-link {
            display: inline-block;
            background-color: #007AFF; /* 经典的蓝色 */
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
        }

        /* 鼠标悬停效果 */
        .email-link:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>你好！</h1>
        <p>如果你有任何问题，欢迎随时联系我。</p>
        <a href="mailto:philiptrip1975@gmail.com" class="email-link">
            发送邮件
        </a>
    </div>

</body>
</html>
